          - listitem [ref=e592]:
            - heading "What can you do here?" [level=4] [ref=e593]
            - paragraph [ref=e594]: • Discover or setup new domains, including authoritative, forward, and reverse domains. Configure dynamic IP updates for a domain using Dynamic DNS or DDNS. Additionally, configure automatic failover with multiple primary and multiple secondary setups for a domain.
          - listitem [ref=e595]:
            - heading "Zone scope" [level=4] [ref=e596]
            - paragraph [ref=e597]: • Zone scopes are unique instances of a domain that allows administrators to manage different versions of DNS records for the same domain name independently. It enables DNS policies to distribute traffic across multiple instances of a zone, providing enhanced flexibility and control over DNS resolution.
            - paragraph [ref=e598]:
              - link "Creating zone scopes" [ref=e599] [cursor=pointer]:
                - /url: https://www.manageengine.com/dns-dhcp-ipam/help/creating-zone-scopes-for-microsoft-dns-in-ddi-central.html
          - listitem [ref=e600]:
            - heading "DDNS" [level=4] [ref=e601]
            - paragraph [ref=e602]: • Enable or disable DDNS to manage a domain dynamically with DHCP-allocated variable IPs.
            - paragraph [ref=e603]:
              - link "Managing dynamic domains in DDI Central" [ref=e604] [cursor=pointer]:
                - /url: https://www.manageengine.com/dns-dhcp-ipam/help/managing-dynamic-domains-for-microsoft-dns-in-ddi-central.html
          - listitem [ref=e605]:
            - heading "Active Directory" [level=4] [ref=e606]
            - paragraph [ref=e607]: •Network admins can enable by toggling 'Active Directory' for every new domains they create, in DDI Central Windows Microsoft. This feature enables authorized devices to automatically update DNS records and enables automated replication across multiple domain controllers.
            - paragraph [ref=e608]:
              - link "Adding AD domains in DDI Central" [ref=e609] [cursor=pointer]:
                - /url: https://www.manageengine.com/dns-dhcp-ipam/help/windows-adding-ad-domains.html
