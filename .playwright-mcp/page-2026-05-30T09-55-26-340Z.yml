              - link "Managing dynamic domains in DDI Central" [ref=e1439] [cursor=pointer]:
                - /url: https://www.manageengine.com/dns-dhcp-ipam/help/managing-dynamic-domains-for-microsoft-dns-in-ddi-central.html
          - listitem [ref=e1440]:
            - heading "Active Directory" [level=4] [ref=e1441]
            - paragraph [ref=e1442]: ŌĆóNetwork admins can enable by toggling 'Active Directory' for every new domains they create, in DDI Central Windows Microsoft. This feature enables authorized devices to automatically update DNS records and enables automated replication across multiple domain controllers.
