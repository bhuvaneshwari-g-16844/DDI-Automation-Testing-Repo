            - heading "What can you do here?" [level=4] [ref=e1428]
            - paragraph [ref=e1429]: ŌĆó Discover or setup new domains, including authoritative, forward, and reverse domains. Configure dynamic IP updates for a domain using Dynamic DNS or DDNS. Additionally, configure automatic failover with multiple primary and multiple secondary setups for a domain.
          - listitem [ref=e1430]:
            - heading "Zone scope" [level=4] [ref=e1431]
            - paragraph [ref=e1432]: ŌĆó Zone scopes are unique instances of a domain that allows administrators to manage different versions of DNS records for the same domain name independently. It enables DNS policies to distribute traffic across multiple instances of a zone, providing enhanced flexibility and control over DNS resolution.
            - paragraph [ref=e1433]:
              - link "Creating zone scopes" [ref=e1434] [cursor=pointer]:
                - /url: https://www.manageengine.com/dns-dhcp-ipam/help/creating-zone-scopes-for-microsoft-dns-in-ddi-central.html
